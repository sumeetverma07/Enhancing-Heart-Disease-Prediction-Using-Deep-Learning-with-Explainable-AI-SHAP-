name: Streamlit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-streamlit-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test imports
        run: |
          python -c "import pandas, numpy, sklearn, matplotlib, seaborn, streamlit, joblib, plotly, shap"
          python -c "from model import load_project_artifacts; print('Imports OK')"

      - name: Start Streamlit app
        run: |
          nohup python -m streamlit run app.py --server.headless true --server.address 0.0.0.0 --server.port 8501 > streamlit.log 2>&1 &
          sleep 15

      - name: Check app is reachable
        run: curl --fail http://127.0.0.1:8501

      - name: Upload Streamlit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-log
          path: streamlit.log
